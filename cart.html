<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Корзина</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<header>
    <div class="logo"><a href="index.html">BookStore</a></div>
    <button class="burger" id="burger">☰</button>
    <nav class="nav-menu" id="navMenu">
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="catalog.html">Каталог</a></li>
            <li><a href="about.html">О нас</a></li>
            <li><a href="contacts.html">Контакты</a></li>
            <li><a href="delivery.html">Доставка</a></li>
            <li><a href="favorites.html">Избранное</a></li>
            <li><a href="cart.html">Корзина</a></li>
        </ul>
    </nav>
    <form class="search-form" action="catalog.html" method="get">
        <input type="text" name="search" placeholder="Поиск книг...">
        <button type="submit">🔍</button>
    </form>
</header>
<main>
    <h1>Корзина</h1>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-total" id="cart-total-container" style="display: none;">
        Итого: <span id="cart-total">0 ₽</span>
    </div>

    <!-- Форма оформления заказа (изначально скрыта) -->
    <div class="checkout-form" id="checkout-form" style="display: none;">
        <h2>Оформление заказа</h2>
        <form id="order-form">
            <div class="form-group">
                <label for="name">ФИО *</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Телефон *</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="address">Адрес доставки *</label>
                <textarea id="address" name="address" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="comment">Комментарий к заказу</label>
                <textarea id="comment" name="comment" rows="2"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">Подтвердить заказ</button>
                <button type="button" class="btn btn-secondary" id="cancel-order">Отмена</button>
            </div>
        </form>
    </div>

    <button class="btn" id="checkout-btn" style="display: none;">Оформить заказ</button>
</main>
<footer>
    <p>&copy; 2026 BookStore. Все права защищены.</p>
</footer>
<script src="./js/script.js"></script>
</body>
</html>
