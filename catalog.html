<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore - Каталог</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<header>
    <div class="logo"><a href="index.html">BookStore</a></div>
    <button class="burger" id="burger">☰</button>
    <nav class="nav-menu" id="navMenu">
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="catalog.html">Каталог</a></li>
            <li><a href="about.html">О нас</a></li>
            <li><a href="contacts.html">Контакты</a></li>
            <li><a href="delivery.html">Доставка</a></li>
            <li><a href="favorites.html">Избранное</a></li>
            <li><a href="cart.html">Корзина</a></li>
        </ul>
    </nav>
    <form class="search-form" action="catalog.html" method="get">
        <input type="text" name="search" placeholder="Поиск книг..." id="search-input">
        <button type="submit">🔍</button>
    </form>
</header>
<main>
    <h1>Каталог книг</h1>
    <div class="filters">
        <div class="filter-group">
            <label for="filter-genre">Жанр</label>
            <select id="filter-genre">
                <option value="">Все</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filter-author">Автор</label>
            <select id="filter-author">
                <option value="">Все</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filter-age">Возрастной ценз</label>
            <select id="filter-age">
                <option value="">Все</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filter-min-price">Цена от</label>
            <input type="number" id="filter-min-price" placeholder="0">
        </div>
        <div class="filter-group">
            <label for="filter-max-price">Цена до</label>
            <input type="number" id="filter-max-price" placeholder="10000">
        </div>
        <div class="filter-actions">
            <button class="btn" id="apply-filters">Применить</button>
            <button class="btn btn-secondary" id="reset-filters">Сброс</button>
        </div>
    </div>
    <div class="book-grid" id="catalog-grid"></div>
</main>
<footer>
    <p>&copy; 2026 BookStore. Все права защищены.</p>
</footer>
<script src="./js/script.js"></script>
</body>
</html>
